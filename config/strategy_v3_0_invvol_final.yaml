# 虾池ETF轮动策略 v3.0 — 多参数鲁棒性验证终版
# 超参数经过 4 维边界扫描 + 12 组鲁棒性评估验证
# 数据: docs/etf_data_build.md (PM 修复 QFQ 前复权)
#
# 超参边界总结:
#   vol_w:      0.70-1.25 全部安全, 最优  1.05
#   invvol:     ≥8 安全, ≤5 失效, 最优 12
#   step_low:   ≥0.12 安全, <0.10 退化, 最优 0.15
#   step_high:  0.25-0.45 全部安全, 最优 0.35
#   vol_window: 10-30 全部安全, WF最佳 20
#   mom_window: 4 为最佳(5 → WF 44%)

strategy:
  name: 虾池ETF轮动 v3.0 — 鲁棒性验证终版
  version: 3.0-final

scoring:
  mom_w: 1.0
  vol_w: 1.05

selection:
  top_n: 2

factors:
  mom_window: 4
  vol_window: 20
  pe_window_years: 5

defense:
  def_alloc: 0.25
  step_low: 0.15
  step_high: 0.35
  max_def: 0.95
  hongli_ratio: 0.50

rebalance:
  threshold: 0.07
  fee_rate: 0.00005
  anchor: W-MON

risk_control:
  stop_loss: 0.08
  recovery_weeks: 4

allocation:
  max_single_alloc: 0.40
  overflow_to_defense_only: true
  dynamic_weight_cap: false

inv_vol_allocation:
  enabled: true
  window: 12

d4_individual_filter:
  enabled: false

softmax_allocation:
  enabled: false

dynamic_weighting:
  enabled: false

constituent_signals:
  enabled: false

regime_classifier:
  enabled: false

data:
  nav_path: data/all_etfs_nav_2013_20260626.csv
  pe_path: data/300etf_pe_percentile_weekly.csv
  start_date: 2013-05-17
  end_date:

reporting:
  risk_free_rate: 0.025
