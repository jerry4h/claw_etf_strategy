# 虾池ETF轮动 v3.0 最终版 — 中证500ETF + C1最优参数
# 超参扫描确认: vol_w范围[0.80,1.25]全安全, invvol>=8安全, step_low>=0.12安全
# C1参数: vol_w=1.10, vol_window=11, mom_window=4, invvol=10, thresh=0.025
# 鲁棒性: MC 100%, DSR 1.0, WF 66.7%, 综合评级 实盘可上
# score_margin 在 selection 段定义（默认 0=关闭）

strategy:
  name: 虾池ETF轮动 v3.0 — 中证500ETF (C1最优)
  version: 3.0

scoring:
  mom_w: 1.0
  vol_w: 1.10

selection:
  top_n: 2
  score_margin: 0.02

factors:
  mom_window: 4
  vol_window: 11
  pe_window_years: 5

defense:
  def_alloc: 0.25
  step_low: 0.15
  step_high: 0.35
  max_def: 0.95
  hongli_ratio: 0.50

rebalance:
  threshold: 0.025
  fee_rate: 0.00005
  anchor: W-MON

risk_control:
  stop_loss: 0.08
  recovery_weeks: 4

allocation:
  max_single_alloc: 0.40
  overflow_to_defense_only: true
  dynamic_weight_cap: false

inv_vol_allocation:
  enabled: true
  window: 10

d4_individual_filter:
  enabled: false

softmax_allocation:
  enabled: false

dynamic_weighting:
  enabled: false

constituent_signals:
  enabled: false

regime_classifier:
  enabled: false

data:
  nav_path: data/all_etfs_nav_latest.csv
  pe_path: data/300etf_pe_percentile_weekly.csv
  start_date: 2013-05-17
  end_date:

reporting:
  risk_free_rate: 0.025