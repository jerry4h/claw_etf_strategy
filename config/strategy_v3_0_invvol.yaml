# 虾池ETF轮动策略 v3.0 — 三层连续, 零门控
# Layer 1 (买什么): v2.3 scoring = 0.35×mom4 − 0.30×vol20, TOP2
# Layer 2 (买多少): inv-vol8 weighted among TOP2
# Layer 3 (防多少): vol 3-tier defense = nasdaq_vol → [25%, 95%]
# 全部纯连续, 零阈值, 零门控, 零悬崖

strategy:
  name: 虾池ETF轮动 v3.0 — inv-vol8 连续分配
  version: 3.0-invvol

scoring:
  mom_w: 0.35
  vol_w: 0.30

selection:
  top_n: 2

factors:
  mom_window: 4
  vol_window: 20
  pe_window_years: 5

defense:
  def_alloc: 0.25
  step_low: 0.20
  step_high: 0.35
  max_def: 0.95
  hongli_ratio: 0.50

rebalance:
  threshold: 0.07
  fee_rate: 0.00005
  anchor: W-MON

risk_control:
  stop_loss: 0.08
  recovery_weeks: 4

allocation:
  max_single_alloc: 0.40
  overflow_to_defense_only: true
  dynamic_weight_cap: false

# ★ Layer 2: inv-vol8 连续分配 (零门控)
inv_vol_allocation:
  enabled: true
  window: 8

# 以下全部关闭 — v3.0 不需要
d4_individual_filter:
  enabled: false

softmax_allocation:
  enabled: false

dynamic_weighting:
  enabled: false

constituent_signals:
  enabled: false

regime_classifier:
  enabled: false

data:
  nav_path: data/all_etfs_nav_2013_2026_h20269_scaled.csv
  pe_path: data/300etf_pe_percentile_weekly.csv
  start_date: 2013-05-20
  end_date: 2026-05-01

reporting:
  risk_free_rate: 0.025