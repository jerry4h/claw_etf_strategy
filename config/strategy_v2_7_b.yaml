# 虾池ETF轮动策略 v2.7 Ablation B — CRISIS-Only Minimal Defense
# 仅 CRISIS 状态触发止损，BULL/NORMAL 无防御（l1=0.99 永远不触发）
# 生成日期: 2026-06-16

strategy:
  name: "虾池ETF轮动 v2.7 Ablation B (CRISIS-Only Defense)"
  version: "2.7-ablation-b"

scoring:
  mom_w: 0.35
  vol_w: 0.30

selection:
  top_n: 2

factors:
  mom_window: 4
  vol_window: 20
  pe_window_years: 5

defense:
  def_alloc: 0.25
  step_low: 0.20
  step_high: 0.35
  max_def: 0.95
  hongli_ratio: 0.50

rebalance:
  threshold: 0.07
  fee_rate: 0.00005
  anchor: "W-MON"

risk_control:
  stop_loss: 0.08
  recovery_weeks: 4

# === P0 三层止损 (默认关闭) ===
stop_loss:
  tiered: false
  l1_drawdown: 0.04
  l1_defense: 0.50
  l2_drawdown: 0.06
  l2_defense: 0.95
  l3_weekly_drop: -0.03
  l3_down_weeks: 3
  l3_window: 4
  l2_recovery_weeks: 4
  l3_recovery_weeks: 2

# === P1 Fix #1: 市场状态感知止损 (v2.7 CRISIS-Only) ===
market_state:
  stateful_stop_loss: true
  # 动量阈值
  ms_bull_mom: 0.10
  ms_crisis_mom: -0.12
  ms_correction_mom: -0.05
  # 波动率百分位阈值
  ms_low_vol_pct: 0.33
  ms_high_vol_pct: 0.67
  ms_mid_vol_pct: 0.50
  # 回撤阈值
  ms_shallow_dd: 0.03
  ms_deep_dd: 0.15
  ms_moderate_dd: 0.08
  # === BULL: 无防御 (l1=0.99 永远不触发) ===
  ss_bull_l1: 0.99
  ss_bull_l1_def: 0.0
  ss_bull_l2: 0.99
  ss_bull_l2_def: 0.0
  ss_bull_recovery: 1
  # === NORMAL: 无防御 (l1=0.99 永远不触发) ===
  ss_normal_l1: 0.99
  ss_normal_l1_def: 0.0
  ss_normal_l2: 0.99
  ss_normal_l2_def: 0.0
  ss_normal_recovery: 2
  # === CRISIS: 唯一触发防御 ===
  ss_crisis_l1: 0.06
  ss_crisis_l1_def: 0.50
  ss_crisis_l2: 0.10
  ss_crisis_l2_def: 0.60
  ss_crisis_recovery: 2
  # CORRECTION 参数（三态系统不使用）
  ss_correction_l1: 0.99
  ss_correction_l1_def: 0.0
  ss_correction_l2: 0.99
  ss_correction_l2_def: 0.0
  ss_correction_recovery: 2

# === Fix #2: 权重上限 ===
allocation:
  max_single_alloc: 0.40
  overflow_to_defense_only: true
  dynamic_weight_cap: false
  dc_bull_cap: 0.50
  dc_normal_cap: 0.35
  dc_crisis_cap: 0.25
  dc_correction_cap: 0.30

data:
  nav_path: "data/all_etfs_nav_2013_2026_h20269_scaled.csv"
  pe_path: "data/300etf_pe_percentile_weekly.csv"
  start_date: "2013-05-20"
  end_date: "2026-05-01"

reporting:
  risk_free_rate: 0.025
