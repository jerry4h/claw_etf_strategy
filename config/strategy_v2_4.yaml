# 虾池ETF轮动策略 v2.4 — 含 P0 改进参数（默认关闭）
# 基于 v2.3 基准配置 + Phase 2a 创新方案
# 生成日期: 2026-06-15

strategy:
  name: "虾池ETF轮动 v2.4"
  version: "2.4"

scoring:
  mom_w: 0.35        # 4周动量权重
  vol_w: 0.30        # 20周波动率权重

selection:
  top_n: 2           # 从进攻层选2只ETF

factors:
  mom_window: 4      # 动量窗口（周）
  vol_window: 20     # 波动率窗口（周）
  pe_window_years: 5 # PE分位数窗口（年）

defense:
  def_alloc: 0.25    # 基准防御比例
  step_low: 0.20     # vol三段式下限
  step_high: 0.35    # vol三段式上限
  max_def: 0.95      # 极限防御比例
  hongli_ratio: 0.50 # 防御层中红利低波占比

rebalance:
  threshold: 0.07    # 调仓阈值（单只仓位变化≥7%才调）
  fee_rate: 0.00005  # 单边费率
  anchor: "W-MON"    # 调仓日锚点
  # === I3: 梯度调仓 === 默认关闭
  gradient: false             # 启用梯度调仓
  threshold_low: 0.05         # 下限阈值（5%以下不调）

risk_control:
  stop_loss: 0.08    # 止损阈值（原始单层，三层关闭时生效）
  recovery_weeks: 4  # 止损恢复观察周数

# === D1: 三层分级止损 === 默认关闭
stop_loss:
  tiered: false               # 启用三层止损（关闭时使用 risk_control.stop_loss）
  l1_drawdown: 0.04           # L1 预警阈值
  l1_defense: 0.50            # L1 强制防御比例
  l2_drawdown: 0.06           # L2 强制止损阈值
  l2_defense: 0.95            # L2 强制防御比例
  l3_weekly_drop: -0.03       # L3 熔断单周跌幅
  l3_down_weeks: 3            # L3 熔断下跌周数
  l3_window: 4                # L3 观察窗口
  l2_recovery_weeks: 4        # L2 恢复观察期
  l3_recovery_weeks: 2        # L3 恢复观察期

# === D2B: 权重上限 === 默认关闭（1.0 = 无上限）
allocation:
  max_single_alloc: 1.0       # 单资产权重上限（设置如 0.30 启用）

data:
  nav_path: "data/all_etfs_nav_2013_2026_h20269_scaled.csv"
  pe_path: "data/300etf_pe_percentile_weekly.csv"
  start_date: "2013-05-20"
  end_date: "2026-05-01"

reporting:
  risk_free_rate: 0.025  # 无风险利率（用于标准夏普）
